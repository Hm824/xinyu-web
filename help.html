<!-- 一键求助/文字咨询页 -->
 <!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>一键求助 · 心语</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* 本页面特有样式 */
    .chat-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 1rem;
      height: calc(100vh - 140px); /* 减去 header + input 区高度 */
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      text-align: center;
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border-color);
    }

    .chat-header h1 {
      font-size: 1.6rem;
      color: var(--accent-red);
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background-color: #f8fafc;
      border-radius: 12px;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
    }

    .message {
      max-width: 80%;
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      border-radius: 18px;
      line-height: 1.5;
      position: relative;
      word-break: break-word;
    }

    .message.received {
      background-color: #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.sent {
      background-color: var(--accent-blue);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .input-area {
      display: flex;
      gap: 0.8rem;
    }

    #message-input {
      flex: 1;
      padding: 0.9rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
    }

    #send-btn {
      padding: 0.9rem 1.4rem;
      background-color: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #send-btn:hover {
      background-color: #3182ce;
    }

    #send-btn:disabled {
      background-color: #a0aec0;
      cursor: not-allowed;
    }

    .status {
      font-size: 0.9rem;
      color: var(--text-light);
      text-align: center;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">心语</div>
  </header>

  <div class="help-btn" aria-label="返回求助页" style="opacity: 0.6; pointer-events: none;">🆘</div>

  <div class="chat-container">
    <div class="chat-header">
      <h1>🆘 一键求助</h1>
      <p>你正在与心理委员文字沟通（响应时间约1-3分钟）</p>
    </div>

    <div class="chat-box" id="chat-box">
      <!-- 消息将通过 JS 动态插入 -->
    </div>

    <div class="input-area">
      <input type="text" id="message-input" placeholder="输入你的消息（例如：我今天很难过）" maxlength="200" />
      <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>

    <p class="status">🔒 所有对话均加密，仅你和咨询师可见</p>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    // 初始化：自动发送欢迎消息
    window.addEventListener('load', () => {
      addMessage('你好！我是心语心理委员 👋<br/>你可以在这里倾诉任何情绪或困扰，我会认真阅读并回复你。', 'received');
      scrollToBottom();
    });

    function addMessage(text, type) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', type);
      msgDiv.innerHTML = text.replace(/\n/g, '<br/>'); // 支持换行
      chatBox.appendChild(msgDiv);
    }

    function scrollToBottom() {
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      // 添加用户消息
      addMessage(text, 'sent');
      messageInput.value = '';
      sendBtn.disabled = true;
      scrollToBottom();

      // 模拟“心理委员”回复（3秒后）
      setTimeout(() => {
        const replies = [
          '谢谢你愿意分享，我在这里陪着你 ❤️',
          '你的感受很重要，请继续说。',
          '听起来你经历了一些困难，需要我帮你梳理吗？',
          '你并不孤单，很多人都有类似的感受。',
          '慢慢来，不用着急，我在听。'
        ];
        const randomReply = replies[Math.floor(Math.random() * replies.length)];
        addMessage(randomReply, 'received');
        sendBtn.disabled = false;
        scrollToBottom();
      }, 3000);
    }

    // 回车发送
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // 按钮状态同步
    messageInput.addEventListener('input', () => {
      sendBtn.disabled = messageInput.value.trim() === '';
    });
  </script>
</body>
</html>
