<!-- 无声正念呼吸页 -->
 <!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>无声正念呼吸 · 心语</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* 本页面特有样式 */
    .breath-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 2rem;
    }

    #breath-ball {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #bee3f8; /* 初始色：平静蓝 */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: white;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(66, 153, 225, 0.3);
      animation: breathe 10s infinite;
      margin-bottom: 2rem;
    }

    .instruction {
      font-size: 1.2rem;
      color: var(--text-light);
      max-width: 600px;
      line-height: 1.8;
    }

    .back-home {
      margin-top: 2rem;
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: var(--accent-blue);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
    }

    .back-home:hover {
      opacity: 0.9;
    }

    /* 呼吸动画：吸气4秒（膨胀+变绿），呼气6秒（收缩+变蓝） */
    @keyframes breathe {
      0% {
        transform: scale(1);
        background-color: #bee3f8; /* 蓝 */
        content: "呼";
      }
      40% {
        transform: scale(1.4);
        background-color: #c6f6d5; /* 绿 */
        content: "吸";
      }
      100% {
        transform: scale(1);
        background-color: #bee3f8; /* 蓝 */
        content: "呼";
      }
    }

    /* 动态更新文字（通过JS） */
    .breath-text {
      font-size: 1.1rem;
      font-weight: bold;
      margin-top: 0.5rem;
      color: var(--text-dark);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">心语</div>
  </header>

  <div class="help-btn" aria-label="一键求助" onclick="location.href='help.html'">🆘</div>

  <div class="breath-container">
    <div id="breath-ball">
      <span id="breath-text">呼</span>
    </div>
    <p class="instruction">跟随圆球的大小和颜色变化进行呼吸：<br/>
      <strong>膨胀（绿色）→ 缓慢吸气</strong>｜<strong>收缩（蓝色）→ 缓慢呼气</strong>
    </p>
    <a href="index.html" class="back-home">返回首页</a>
  </div>

  <script>
    // 呼吸状态管理
    const breathBall = document.getElementById('breath-ball');
    const breathText = document.getElementById('breath-text');

    let isAnimating = true;

    function updateBreathState() {
      if (!isAnimating) return;

      // 每4秒切换一次状态（模拟吸/呼节奏）
      setInterval(() => {
        if (breathText.textContent === '呼') {
          breathText.textContent = '吸';
        } else {
          breathText.textContent = '呼';
          // 呼气结束时触发振动（仅在支持的设备上）
          if (navigator.vibrate) {
            navigator.vibrate(200); // 振动200毫秒
          }
        }
      }, 4000);
    }

    // 页面加载后启动
    window.addEventListener('load', () => {
      // 确保动画流畅重启
      breathBall.style.animation = 'none';
      setTimeout(() => {
        breathBall.style.animation = 'breathe 10s infinite';
      }, 10);

      updateBreathState();
    });

    // 键盘支持：按空格暂停/继续（可选扩展）
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ') {
        e.preventDefault();
        isAnimating = !isAnimating;
        if (!isAnimating) {
          breathBall.style.animationPlayState = 'paused';
        } else {
          breathBall.style.animationPlayState = 'running';
        }
      }
    });
  </script>
</body>
</html>
